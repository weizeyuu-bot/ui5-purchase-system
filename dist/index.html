<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My UI5 Application</title>
    <script>
        (function () {
            var savedLang = localStorage.getItem("app-language");
            if (savedLang) {
                var urlParams = new URLSearchParams(window.location.search);
                if ((urlParams.get("sap-language") || "").toUpperCase() !== savedLang.toUpperCase()) {
                    var url = new URL(window.location.href);
                    url.searchParams.set("sap-language", savedLang);
                    window.location.replace(url.toString());
                }
            }
        })();
    </script>
    <script
        id="sap-ui-bootstrap"
        src="resources/sap-ui-core.js"
        data-sap-ui-theme="sap_fiori_3"
        data-sap-ui-resourceroots='{
            "myapp": "./"
        }'
        data-sap-ui-oninit="module:myapp/index"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true">
    </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
