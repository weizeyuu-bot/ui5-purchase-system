specVersion: '3.0'
metadata:
  name: my-ui5-app
type: application
framework:
  name: OpenUI5
  version: 1.108.49
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: http://localhost:3000/api